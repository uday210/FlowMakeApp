[build]
builder = "nixpacks"

[build.nixpacks]
NODE_VERSION = "20"

[deploy]
startCommand = "npm start"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[crons]]
name = "scheduler"
schedule = "* * * * *"
command = "curl -s $NEXT_PUBLIC_APP_URL/api/scheduler/run"

[[crons]]
name = "mqtt-listener"
schedule = "*/2 * * * *"
command = "curl -s $NEXT_PUBLIC_APP_URL/api/mqtt-listener"
